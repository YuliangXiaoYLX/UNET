experiment: 2D_UNet_Heart_CT_150_Epochs

# Model
model:
  class_num: 8 # 1 + 1
  channels: [8,16,16,32,32,32,32]
  strides: [1,2,1,2,1,2] 

# Dataset
dataset:
  root_dir: '/home/chrisxiao/Downloads/unet_code_and_data/UNET_Data/Heart/ct'

# Losses
losses:
  ce:
    weight: 0.0
  dice:
    weight: 1.0
    
# Optimizer
opt_params:
  lr_default:  1e-4

# Runner
max_iter: 150
val_iter: 5
# Dataloader  
train_bs: 64 # 8
val_bs: 128 # 8
test_bs: 1
num_workers: 16
